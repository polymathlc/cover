<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worksheet Cover Page — Polymath Learning Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111;
    --line: #111;
    --muted: #666;
    --paper: #fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #ececec;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── TOOLBAR (screen only) ── */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #fff;
    border-bottom: 1px solid #ccc;
    padding: 0.6rem 1rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .toolbar label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toolbar input[type="text"] {
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.4rem 0.6rem;
    border: 1px solid #bbb;
    border-radius: 3px;
    min-width: 220px;
  }

  .toolbar .spacer { flex: 1; }

  .toolbar button {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .toolbar button:hover { background: #333; }
  .toolbar button:active { transform: translateY(1px); }

  /* ── PAGE — A4 portrait ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 6rem auto 3rem;
    background: var(--paper);
    padding: 25mm 22mm;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* top + bottom thin rule for structure, no colour */
  .page::before,
  .page::after {
    content: '';
    position: absolute;
    left: 22mm;
    right: 22mm;
    height: 1px;
    background: var(--line);
  }
  .page::before { top: 18mm; }
  .page::after  { bottom: 18mm; }

  .page-header {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .page-footer {
    text-align: center;
    margin-top: auto;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CENTRE BLOCK ── */
  .center-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    text-align: center;
    padding-bottom: 40mm;
  }

  .logo {
    width: 180px;
    height: auto;
    display: block;
  }

  .worksheet-name {
    font-family: 'Crimson Pro', serif;
    font-size: 3.2rem;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
    word-break: break-word;
    padding: 0 1rem;
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    text-align: center;
  }

  .worksheet-name:focus { background: #faf6e8; }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-size: 1.6rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.01em;
    color: var(--muted);
    margin-top: -1.2rem;
    border: none;
    outline: none;
    background: transparent;
    text-align: center;
    padding: 0 1rem;
    width: 100%;
    word-break: break-word;
  }

  .subtitle:focus { background: #faf6e8; }

  @media print {
    .subtitle:focus { background: transparent; }
  }

  /* ── FIELDS ── */
  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.2rem;
    width: 100%;
    max-width: 480px;
    margin-top: 1.5rem;
  }

  .field {
    text-align: left;
  }

  .field .label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .field .line {
    border-bottom: 1px solid var(--line);
    height: 1.6rem;
  }

  /* ── CORNER DECORATIONS ── */
  .corner-deco {
    position: absolute;
    bottom: 0;
    width: 62mm;
    height: auto;
    z-index: 0;
    pointer-events: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .corner-deco.left  { left: 0; }
  .corner-deco.right { right: 0; }

  /* keep text and rules above the decorations */
  .page-header,
  .page-footer,
  .center-block {
    position: relative;
    z-index: 1;
  }

  /* ── PRINT ── */
  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    html, body {
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .toolbar { display: none !important; }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0;
      padding: 25mm 22mm;
      box-shadow: none;
      page-break-after: always;
    }

    .worksheet-name:focus { background: transparent; }
  }
</style>
</head>
<body>

<div class="toolbar" aria-label="Cover page controls">
  <label for="ws-input">Title</label>
  <input id="ws-input" type="text" value="Circles" placeholder="Enter title…">
  <label for="sub-input">Subheader</label>
  <input id="sub-input" type="text" value="Worksheet" placeholder="Enter subheader…">
  <div class="spacer"></div>
  <button type="button" onclick="window.print()">Export PDF / Print</button>
</div>

<div class="page" id="page">

  <!-- pastel turquoise polygons — bottom left -->
  <svg class="corner-deco left" viewBox="0 0 240 220" aria-hidden="true">
    <polygon points="0,220 0,90 60,140"     fill="#a5e3dd"/>
    <polygon points="0,220 60,140 45,220"   fill="#cdf0ec"/>
    <polygon points="45,220 60,140 120,175" fill="#b4e9e3"/>
    <polygon points="45,220 120,175 115,220" fill="#dff6f3"/>
    <polygon points="115,220 120,175 180,220" fill="#c2ece7"/>
    <polygon points="0,90 0,30 60,140"      fill="#d8f4f0"/>
    <polygon points="60,140 120,175 130,105" fill="#eafaf8"/>
  </svg>

  <!-- pastel pink polygons — bottom right -->
  <svg class="corner-deco right" viewBox="0 0 240 220" aria-hidden="true">
    <polygon points="240,220 240,90 180,140"  fill="#f5c1d6"/>
    <polygon points="240,220 180,140 195,220" fill="#fbe0eb"/>
    <polygon points="195,220 180,140 120,175" fill="#f7cee0"/>
    <polygon points="195,220 120,175 125,220" fill="#fdedf4"/>
    <polygon points="125,220 120,175 60,220"  fill="#f9d8e6"/>
    <polygon points="240,90 240,30 180,140"   fill="#fce6ef"/>
    <polygon points="180,140 120,175 110,105" fill="#fef3f8"/>
  </svg>

  <div class="page-header">Polymath Learning Centre</div>

  <div class="center-block">
    <img class="logo"
         src="https://www.dropbox.com/scl/fi/2wc1ulpjuiaqlxk5qhc07/polymath-logo-sticker-copy.png?rlkey=jhutxqmdbwe0jgoqcwdxzwt55&raw=1"
         alt="Polymath Learning Centre logo">

    <h1 class="worksheet-name"
        contenteditable="true"
        spellcheck="false"
        id="ws-heading">Circles</h1>

    <div class="subtitle"
         contenteditable="true"
         spellcheck="false"
         id="sub-heading">Worksheet</div>

    <div class="fields">
      <div class="field">
        <div class="label">Name</div>
        <div class="line"></div>
      </div>
      <div class="field">
        <div class="label">Date</div>
        <div class="line"></div>
      </div>
    </div>
  </div>

  <div class="page-footer">Primary Mathematics</div>
</div>

<script>
  const input = document.getElementById('ws-input');
  const heading = document.getElementById('ws-heading');
  const subInput = document.getElementById('sub-input');
  const subHeading = document.getElementById('sub-heading');

  // toolbar input → heading
  input.addEventListener('input', () => {
    heading.textContent = input.value || ' ';
  });

  // inline edit of heading → toolbar input
  heading.addEventListener('input', () => {
    input.value = heading.textContent.trim();
  });

  // toolbar input → subheader
  subInput.addEventListener('input', () => {
    subHeading.textContent = subInput.value || ' ';
  });

  // inline edit of subheader → toolbar input
  subHeading.addEventListener('input', () => {
    subInput.value = subHeading.textContent.trim();
  });

  // sync the document title for nicer PDF filename
  function syncTitle() {
    const name = (input.value || 'Worksheet').trim();
    document.title = name + ' — Cover Page';
  }
  input.addEventListener('input', syncTitle);
  heading.addEventListener('input', syncTitle);
  syncTitle();
</script>

</body>
</html>
