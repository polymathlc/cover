<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worksheet Cover Page — Polymath Learning Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111;
    --line: #111;
    --muted: #666;
    --paper: #fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #ececec;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── TOOLBAR (screen only) ── */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #fff;
    border-bottom: 1px solid #ccc;
    padding: 0.6rem 1rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .toolbar label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toolbar input[type="text"] {
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.4rem 0.6rem;
    border: 1px solid #bbb;
    border-radius: 3px;
    min-width: 220px;
  }

  .toolbar .spacer { flex: 1; }

  .toolbar button {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .toolbar button:hover { background: #333; }
  .toolbar button:active { transform: translateY(1px); }

  /* ── PAGE — A4 portrait ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 6rem auto 3rem;
    background: var(--paper);
    padding: 25mm 22mm;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* top + bottom thin rule for structure, no colour */
  .page::before,
  .page::after {
    content: '';
    position: absolute;
    left: 22mm;
    right: 22mm;
    height: 1px;
    background: var(--line);
  }
  .page::before { top: 18mm; }
  .page::after  { bottom: 18mm; }

  .page-header {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .page-footer {
    text-align: center;
    margin-top: auto;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CENTRE BLOCK ── */
  .center-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    text-align: center;
    padding-bottom: 40mm;
  }

  .logo {
    width: 180px;
    height: auto;
    display: block;
  }

  .worksheet-name {
    font-family: 'Crimson Pro', serif;
    font-size: 3.2rem;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
    word-break: break-word;
    padding: 0 1rem;
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    text-align: center;
  }

  .worksheet-name:focus { background: #faf6e8; }

  .subtitle {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -1rem;
  }

  /* ── FIELDS ── */
  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.2rem;
    width: 100%;
    max-width: 480px;
    margin-top: 1.5rem;
  }

  .field {
    text-align: left;
  }

  .field .label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .field .line {
    border-bottom: 1px solid var(--line);
    height: 1.6rem;
  }

  /* ── PRINT ── */
  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    html, body {
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .toolbar { display: none !important; }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0;
      padding: 25mm 22mm;
      box-shadow: none;
      page-break-after: always;
    }

    .worksheet-name:focus { background: transparent; }
  }
</style>
</head>
<body>

<div class="toolbar" aria-label="Cover page controls">
  <label for="ws-input">Worksheet</label>
  <input id="ws-input" type="text" value="Circles" placeholder="Enter worksheet name…">
  <div class="spacer"></div>
  <button type="button" onclick="window.print()">Export PDF / Print</button>
</div>

<div class="page" id="page">

  <div class="page-header">Polymath Learning Centre</div>

  <div class="center-block">
    <img class="logo"
         src="https://www.dropbox.com/scl/fi/2wc1ulpjuiaqlxk5qhc07/polymath-logo-sticker-copy.png?rlkey=jhutxqmdbwe0jgoqcwdxzwt55&raw=1"
         alt="Polymath Learning Centre logo">

    <h1 class="worksheet-name"
        contenteditable="true"
        spellcheck="false"
        id="ws-heading">Circles</h1>

    <div class="subtitle">Worksheet</div>

    <div class="fields">
      <div class="field">
        <div class="label">Name</div>
        <div class="line"></div>
      </div>
      <div class="field">
        <div class="label">Date</div>
        <div class="line"></div>
      </div>
    </div>
  </div>

  <div class="page-footer">Primary Mathematics</div>
</div>

<script>
  const input = document.getElementById('ws-input');
  const heading = document.getElementById('ws-heading');

  // toolbar input → heading
  input.addEventListener('input', () => {
    heading.textContent = input.value || ' ';
  });

  // inline edit of heading → toolbar input
  heading.addEventListener('input', () => {
    input.value = heading.textContent.trim();
  });

  // sync the document title for nicer PDF filename
  function syncTitle() {
    const name = (input.value || 'Worksheet').trim();
    document.title = name + ' — Cover Page';
  }
  input.addEventListener('input', syncTitle);
  heading.addEventListener('input', syncTitle);
  syncTitle();
</script>

</body>
</html>
