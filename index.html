<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worksheet Cover Page — Polymath Learning Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111;
    --line: #111;
    --muted: #666;
    --paper: #fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #ececec;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── TOOLBAR (screen only) ── */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #fff;
    border-bottom: 1px solid #ccc;
    padding: 0.6rem 1rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .toolbar label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toolbar input[type="text"] {
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.4rem 0.6rem;
    border: 1px solid #bbb;
    border-radius: 3px;
    min-width: 220px;
  }

  .toolbar .spacer { flex: 1; }

  .toolbar button {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .toolbar button:hover { background: #333; }
  .toolbar button:active { transform: translateY(1px); }

  /* ── PAGE — A4 portrait ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 6rem auto 3rem;
    background: var(--paper);
    padding: 25mm 22mm;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* top + bottom thin rule for structure, no colour */
  .page::before,
  .page::after {
    content: '';
    position: absolute;
    left: 22mm;
    right: 22mm;
    height: 1px;
    background: var(--line);
  }
  .page::before { top: 18mm; }
  .page::after  { bottom: 18mm; }

  .page-header {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .page-footer {
    text-align: center;
    margin-top: auto;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    border: none;
    outline: none;
    background: transparent;
  }

  .page-footer:focus { background: #faf6e8; }

  /* ── CENTRE BLOCK ── */
  .center-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    text-align: center;
    padding-bottom: 40mm;
  }

  .logo {
    width: 180px;
    height: auto;
    display: block;
  }

  .worksheet-name {
    font-family: 'Crimson Pro', serif;
    font-size: 3.2rem;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
    word-break: break-word;
    padding: 0 1rem;
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    text-align: center;
  }

  .worksheet-name:focus { background: #faf6e8; }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-size: 1.6rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.01em;
    color: var(--muted);
    margin-top: -1.2rem;
    border: none;
    outline: none;
    background: transparent;
    text-align: center;
    padding: 0 1rem;
    width: 100%;
    word-break: break-word;
  }

  .subtitle:focus { background: #faf6e8; }

  @media print {
    .subtitle:focus { background: transparent; }
    .page-footer:focus { background: transparent; }
  }

  /* ── FIELDS ── */
  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.2rem;
    width: 100%;
    max-width: 480px;
    margin-top: 1.5rem;
  }

  .field {
    text-align: left;
  }

  .field .label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .field .line {
    border-bottom: 1px solid var(--line);
    height: 1.6rem;
  }

  /* ── PAGE DECORATIONS ── */
  .page-deco {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    font-family: 'DM Sans', sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* keep text and rules above the decorations */
  .page-header,
  .page-footer,
  .center-block {
    position: relative;
    z-index: 1;
  }

  /* ── PRINT ── */
  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    html, body {
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .toolbar { display: none !important; }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0;
      padding: 25mm 22mm;
      box-shadow: none;
      page-break-after: always;
    }

    .worksheet-name:focus { background: transparent; }
  }
</style>
</head>
<body>

<div class="toolbar" aria-label="Cover page controls">
  <label for="ws-input">Title</label>
  <input id="ws-input" type="text" value="Circles" placeholder="Enter title…">
  <label for="sub-input">Subheader</label>
  <input id="sub-input" type="text" value="Worksheet" placeholder="Enter subheader…">
  <label for="footer-input">Footer</label>
  <input id="footer-input" type="text" value="Primary Mathematics" placeholder="Enter footer…">
  <div class="spacer"></div>
  <button type="button" onclick="window.print()">Export PDF / Print</button>
</div>

<div class="page" id="page">

  <!-- pastel decorations: circles, shapes & math symbols -->
  <svg class="page-deco" viewBox="0 0 210 297" preserveAspectRatio="xMidYMid slice" aria-hidden="true">

    <!-- top-left cluster (turquoise, hints of pink) -->
    <circle cx="8" cy="14" r="26" fill="#a5e3dd" opacity="0.5"/>
    <circle cx="36" cy="6" r="13" fill="#cdf0ec" opacity="0.6"/>
    <circle cx="6" cy="46" r="9" fill="#7fd6cd" opacity="0.4"/>
    <circle cx="28" cy="32" r="4.5" fill="#f5c1d6" opacity="0.65"/>
    <circle cx="52" cy="14" r="3" fill="#a5e3dd" opacity="0.7"/>
    <polygon points="42,26 52,30 44,38" fill="#bdebe6" opacity="0.8"/>
    <rect x="14" y="58" width="7" height="7" rx="1" fill="#f9d8e6" transform="rotate(20 17.5 61.5)"/>
    <text x="40" y="54" font-size="11" font-weight="600" fill="#6cc9c0" opacity="0.75" transform="rotate(-12 40 54)">π</text>
    <text x="24" y="78" font-size="9" font-weight="500" fill="#eb9bbf" opacity="0.7" transform="rotate(15 24 78)">+</text>

    <!-- bottom-right cluster (pink, hints of turquoise) -->
    <circle cx="202" cy="284" r="26" fill="#f5c1d6" opacity="0.5"/>
    <circle cx="174" cy="292" r="13" fill="#fbe0eb" opacity="0.6"/>
    <circle cx="204" cy="252" r="9" fill="#f0a8c8" opacity="0.4"/>
    <circle cx="182" cy="266" r="4.5" fill="#a5e3dd" opacity="0.65"/>
    <circle cx="156" cy="282" r="3" fill="#f5c1d6" opacity="0.7"/>
    <polygon points="168,268 158,272 166,260" fill="#f9d8e6" opacity="0.8"/>
    <rect x="190" y="232" width="7" height="7" rx="1" fill="#bdebe6" transform="rotate(-20 193.5 235.5)"/>
    <text x="158" y="294" font-size="10" font-weight="600" fill="#eb9bbf" opacity="0.75" transform="rotate(10 158 294)">÷</text>
    <text x="176" y="246" font-size="9" font-weight="500" fill="#6cc9c0" opacity="0.7" transform="rotate(-15 176 246)">×</text>

    <!-- sprinkles: top edge -->
    <polygon points="150,6 157,8 152,14" fill="#f9d8e6" opacity="0.75"/>
    <circle cx="180" cy="10" r="4" fill="#bdebe6" opacity="0.6"/>
    <text x="196" y="28" font-size="7" font-weight="500" fill="#eb9bbf" opacity="0.6" transform="rotate(18 196 28)">×</text>
    <circle cx="203" cy="44" r="2.5" fill="#f5c1d6" opacity="0.6"/>

    <!-- sprinkles: right edge -->
    <text x="199" y="120" font-size="8" font-weight="500" fill="#6cc9c0" opacity="0.55" transform="rotate(-10 199 120)">+</text>
    <circle cx="205" cy="160" r="3.5" fill="#fbe0eb" opacity="0.8"/>
    <polygon points="202,196 208,199 203,205" fill="#bdebe6" opacity="0.65"/>

    <!-- sprinkles: left edge -->
    <circle cx="5" cy="120" r="3" fill="#f5c1d6" opacity="0.6"/>
    <text x="3" y="166" font-size="8" font-weight="600" fill="#6cc9c0" opacity="0.55" transform="rotate(12 3 166)">=</text>
    <polygon points="6,210 13,213 8,219" fill="#cdf0ec" opacity="0.8"/>
    <text x="3" y="252" font-size="7" font-weight="500" fill="#eb9bbf" opacity="0.6" transform="rotate(-15 3 252)">%</text>

    <!-- sprinkles: bottom edge -->
    <circle cx="34" cy="290" r="4" fill="#a5e3dd" opacity="0.55"/>
    <text x="58" y="294" font-size="8" font-weight="600" fill="#eb9bbf" opacity="0.6" transform="rotate(-8 58 294)">√</text>
    <circle cx="100" cy="293" r="2.5" fill="#f9d8e6" opacity="0.8"/>
    <polygon points="124,288 131,290 126,296" fill="#bdebe6" opacity="0.7"/>
  </svg>

  <div class="page-header">Polymath Learning Centre</div>

  <div class="center-block">
    <img class="logo"
         src="https://www.dropbox.com/scl/fi/2wc1ulpjuiaqlxk5qhc07/polymath-logo-sticker-copy.png?rlkey=jhutxqmdbwe0jgoqcwdxzwt55&raw=1"
         alt="Polymath Learning Centre logo">

    <h1 class="worksheet-name"
        contenteditable="true"
        spellcheck="false"
        id="ws-heading">Circles</h1>

    <div class="subtitle"
         contenteditable="true"
         spellcheck="false"
         id="sub-heading">Worksheet</div>

    <div class="fields">
      <div class="field">
        <div class="label">Name</div>
        <div class="line"></div>
      </div>
      <div class="field">
        <div class="label">Date</div>
        <div class="line"></div>
      </div>
    </div>
  </div>

  <div class="page-footer"
       contenteditable="true"
       spellcheck="false"
       id="footer-text">Primary Mathematics</div>
</div>

<script>
  const input = document.getElementById('ws-input');
  const heading = document.getElementById('ws-heading');
  const subInput = document.getElementById('sub-input');
  const subHeading = document.getElementById('sub-heading');
  const footerInput = document.getElementById('footer-input');
  const footerText = document.getElementById('footer-text');

  // toolbar input → heading
  input.addEventListener('input', () => {
    heading.textContent = input.value || ' ';
  });

  // inline edit of heading → toolbar input
  heading.addEventListener('input', () => {
    input.value = heading.textContent.trim();
  });

  // toolbar input → subheader
  subInput.addEventListener('input', () => {
    subHeading.textContent = subInput.value || ' ';
  });

  // inline edit of subheader → toolbar input
  subHeading.addEventListener('input', () => {
    subInput.value = subHeading.textContent.trim();
  });

  // toolbar input → footer
  footerInput.addEventListener('input', () => {
    footerText.textContent = footerInput.value || ' ';
  });

  // inline edit of footer → toolbar input
  footerText.addEventListener('input', () => {
    footerInput.value = footerText.textContent.trim();
  });

  // sync the document title for nicer PDF filename
  function syncTitle() {
    const name = (input.value || 'Worksheet').trim();
    document.title = name + ' — Cover Page';
  }
  input.addEventListener('input', syncTitle);
  heading.addEventListener('input', syncTitle);
  syncTitle();
</script>

</body>
</html>
